<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Projets Xefi — Enys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #8B1538;
      --dark:   #1a1a2e;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 24px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .back:hover { color: #fff; }

    .logo {
      height: 48px;
      margin-bottom: 48px;
      opacity: 0.9;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 40px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .badge {
      display: inline-block;
      background: rgba(139,21,56,0.2);
      border: 1px solid rgba(139,21,56,0.5);
      color: #e87aa0;
      border-radius: 40px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 24px;
    }

    h1 span { color: var(--orange); }

    p {
      color: rgba(255,255,255,0.6);
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.7;
      max-width: 560px;
      margin: 0 auto;
    }

    p strong {
      color: #fff;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">← Retour au portfolio</a>

  <img src="assets/logo_xefi_blanc.png" alt="Xefi" class="logo">

  <div class="loader"></div>

  <div class="badge">En construction</div>

  <h1>Cette page arrive <span>bientôt</span>.</h1>

  <p>
    0619863947<br><br>
    <strong>Je me ferai un plaisir de vous détailler de vive voix tout ce que j'ai réalisé chez Xefi</strong> — les projets, les technologies utilisées, les problématiques résolues.
  </p>

</body>
</html>
